# Proxy DiT diffusion policy config
# Data: mug_handover_webdataset (WebDataset, 24-step chunks, 20-D actions)

n_users: 3
bias_dim: 64
hidden_size: 512
depth: 8
num_heads: 8
pred_horizon: 24       # matches webdataset chunk size
action_dim: 20         # matches webdataset 20-D action layout
state_dim: 14          # 7-D EEF * 2 arms (zeros for proxy; not in webdataset)
clip_dim: 768          # open_clip ViT-B/16 internal transformer dim

lr: 0.001
warmup_steps: 500
max_steps: 10000
batch_size: 64
weight_decay: 0.01

# UCVLA loss ablation flags
lambda_triplet: 0.0    # embedding-space triplet on sampled z; set 0.0 to disable
lambda_ortho: 0.0      # orthogonality on mu vectors; set 0.0 to disable
lambda_kl: 0.001       # KL regularization for variational embedding; set 0.0 to disable
lambda_sdtw: 0.05      # windowed soft-DTW triplet on pred velocities; 0.0 = disabled (opt-in)
triplet_margin: 0.5    # margin for both triplet losses (decimal literal — yaml parses 1e-3 as string)
sdtw_window: 8         # window size in timesteps for soft-DTW triplet
sdtw_stride: 4         # stride for sliding window (T=24, w=8, stride=4 → 5 windows)
sdtw_gamma: 1.0        # soft-DTW smoothing: lower = sharper alignment

log_every: 10
val_every: 500
save_every: 2000

wandb_project: ucvla-proxy
